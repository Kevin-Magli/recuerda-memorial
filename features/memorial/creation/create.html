<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Memorial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/styles/global-style.css" />
    <link rel="stylesheet" href="memorial-creation.css" />
  </head>
  <body>
    <header>
      <div id="navbar-component"></div>
    </header>

    <h1 class="title">Crie seu memorial</h1>

    <form id="memorial-form">
      <label for="name">Nome</label>
      <input type="text" id="name" required />
      <label for="born">Data de Nascimento</label>
      <input type="date" name="born" id="born" required />
      <label for="dead">Data de Falecimento</label>
      <input type="date" name="dead" id="dead" />
      <label for="profile-pic">Foto da Pessoa</label>
      <input type="file" name="profile-pic" id="profile-pic" accept="image/*" />
      <label for="description">Descrição Curta</label>
      <textarea name="description" id="description" maxlength="200"></textarea>
      <button type="submit" class="btn-var1">Criar</button>
    </form>

    <script src="/shared/components/navbar/navbar.js"></script>
    <script type="module" src="memorial-creation.js"></script>
  </body>
</html>
