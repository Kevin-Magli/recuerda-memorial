<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memorial</title>
    <link rel="stylesheet" href="/shared/styles/global-style.css" />
    <link rel="stylesheet" href="memorial-style.css" />
  </head>
  <body>
    <header>
      <div id="navbar-component"></div>
    </header>

    <div class="memorial-container">
      <div class="profile-main-section">
        <div class="img-container">
          <img id="memorial-image" src="" />
        </div>
        <div class="main-info">
          <h1 id="memorial-name"></h1>
          <p id="memorial-dates"></p>
        </div>
      </div>

      <p id="memorial-description"></p>
    </div>

    <div class="tribute-section">
      <form id="tribute-form">
        <input type="name" />
        <textarea id="tribute-text" name="tribute-text"cols="30" rows="10"></textarea>
      </form>
    </div>

    <div class="row-2 actionsContainer">
      <button class="btn btn-var2 edit">
        <img src="/shared/assets/icons/edit.svg" alt="edit icon">
      </button>
      <button class="btn delete">
        <img src="/shared/assets/icons/trash.svg" alt="delete icon">
      </button>
    </div>
    <script type="module" src="/main.js"></script>
    <script type="module" src="memorialPage.js"></script>
  </body>
</html>
