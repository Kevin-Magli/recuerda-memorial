<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/shared/styles/global-style.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header>
      <div id="navbar-component"></div>
    </header>
    <div id="top-bar">
      <div class="tab" data-tab="memorial">
        <img
          src="/shared/assets/icons/dashboard/heart.svg"
          alt="icon"
          width="22"
        />
        <span>Memoriais</span>
      </div>
      <div class="tab" data-tab="tributes">
        <img
          src="/shared/assets/icons/dashboard/bubble.svg"
          alt="icon"
          width="22"
        />
        <span>Tributos</span>
      </div>
      <div class="tab" data-tab="access">
        <img
          src="/shared/assets/icons/dashboard/key.svg"
          alt="icon"
          width="22"
        />
        <span>Acessos</span>
      </div>
      <div class="tab" data-tab="media">
        <img
          src="/shared/assets/icons/dashboard/picture.svg"
          alt="icon"
          width="22"
        />
        <span>Mídia</span>
      </div>
      <div class="tab" data-tab="subscription">
        <img
          src="/shared/assets/icons/dashboard/money.svg"
          alt="icon"
          width="22"
        />
        <span>Assinatura</span>
      </div>
    </div>
    <div id="content"></div>
    <script type="module" src="/main.js"></script>
    <script type="module" src="dashboard.js"></script>
  </body>
</html>
