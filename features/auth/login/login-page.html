<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagina de Login</title>
    <link rel="stylesheet" href="/shared/styles/global-style.css" />
    <link rel="stylesheet" href="login-page.css" />
  </head>
  <body>
    <header>
      <div id="navbar-component"></div>
    </header>

    <div class="auth-container">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">
          Entrar
        </button>
        <button class="tab-btn" onclick="switchTab('register')">
          Criar Conta
        </button>
      </div>

      <!-- Formulário de Login -->
      <form id="login-form" class="form-content active">
        <input
          type="email"
          id="login-email"
          name="login-email"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="login-password"
          name="login-password"
          placeholder="Senha"
          required
        />
        <button class="btn-var1" type="submit">Entrar</button>
      </form>

      <!-- Formulário de Registro -->
      <form id="register-form" class="form-content">
        <input
          type="text"
          id="reg-name"
          name="name"
          placeholder="Nome"
          required
        />
        <input
          type="email"
          id="reg-email"
          name="email"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="reg-password"
          name="password"
          placeholder="Senha"
          required
        />
        <button class="btn-var1" type="submit">Cadastrar</button>
      </form>
    </div>

    <p id="message"></p>

    <script>
      function switchTab(tab) {
        const loginForm = document.getElementById("login-form");
        const registerForm = document.getElementById("register-form");
        const tabs = document.querySelectorAll(".tab-btn");

        tabs.forEach((t) => t.classList.remove("active"));

        if (tab === "login") {
          loginForm.classList.add("active");
          registerForm.classList.remove("active");
          tabs[0].classList.add("active");
        } else {
          loginForm.classList.remove("active");
          registerForm.classList.add("active");
          tabs[1].classList.add("active");
        }
      }
    </script>
    <script
      type="module"
      src="/features/auth/login/account-handler.js"
    ></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
